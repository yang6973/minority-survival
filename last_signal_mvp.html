<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAST SIGNAL</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #18233f, #060814 70%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #aeb8d8;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
    }
    .stat span {
      display: block;
      color: #9da8c9;
      font-size: 12px;
    }
    .stat strong {
      font-size: 22px;
    }
    .question {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
      margin: 24px 0;
    }
    .choice {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #3264ff, #7b4dff);
    }
    .choice.b {
      background: linear-gradient(135deg, #ff6b6b, #ff9f43);
    }
    .choice:active {
      transform: scale(0.98);
    }
    .result {
      margin-top: 20px;
      background: rgba(0,0,0,0.25);
      border-radius: 20px;
      padding: 18px;
    }
    .bar-wrap {
      margin: 14px 0;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #cbd3ee;
      margin-bottom: 6px;
    }
    .bar {
      height: 12px;
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      width: 0%;
      transition: width .6s ease;
    }
    .survive {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      margin: 22px 0 8px;
    }
    .survive.win { color: #00ffb2; }
    .survive.lose { color: #ff6464; }
    .desc {
      color: #b9c3df;
      text-align: center;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .next {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      font-weight: 900;
      color: #0b1020;
      background: #ffffff;
      cursor: pointer;
    }
    .ghost {
      margin-top: 10px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 15px;
      font-size: 15px;
      font-weight: 800;
      color: white;
      background: transparent;
      cursor: pointer;
    }
    .hidden { display: none; }
    .footer {
      margin-top: 20px;
      text-align: center;
      color: #6f7ba1;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="logo">LAST SIGNAL</div>
    <div class="subtitle">AI의 예측을 피해 살아남는 30초 심리 생존게임</div>

    <section class="stats">
      <div class="stat">
        <span>현재 참가자</span>
        <strong id="players">4,281</strong>
      </div>
      <div class="stat">
        <span>내 생존 라운드</span>
        <strong id="round">0</strong>
      </div>
    </section>

    <section id="game">
      <div class="question" id="question"></div>
      <button class="choice" id="choiceA"></button>
      <button class="choice b" id="choiceB"></button>
    </section>

    <section id="result" class="result hidden">
      <div class="bar-wrap">
        <div class="bar-label">
          <span id="labelA"></span>
          <span id="percentA"></span>
        </div>
        <div class="bar"><div class="bar-fill" id="barA"></div></div>
      </div>

      <div class="bar-wrap">
        <div class="bar-label">
          <span id="labelB"></span>
          <span id="percentB"></span>
        </div>
        <div class="bar"><div class="bar-fill" id="barB"></div></div>
      </div>

      <div id="surviveText" class="survive"></div>
      <div id="desc" class="desc"></div>

      <button class="next" onclick="nextRound()">NEXT ROUND</button>
      <button class="ghost" onclick="revive()">광고 보고 부활하기</button>
    </section>

    <div class="footer">다수 선택은 탈락 · 소수 선택은 생존</div>
  </main>

  <script>
    const questions = [
      ["평생 하나만 먹어야 한다면?", "치킨", "피자"],
      ["하루만 초능력을 가진다면?", "순간이동", "투명인간"],
      ["더 싫은 상황은?", "카톡 읽씹", "약속 당일 취소"],
      ["월요일 아침에 더 필요한 건?", "커피", "반차"],
      ["친구가 돈을 안 갚는다면?", "바로 말한다", "기다린다"],
      ["평생 하나만 쓸 수 있다면?", "유튜브", "카카오톡"],
      ["더 무서운 건?", "통장 잔고 0원", "휴대폰 배터리 1%"],
      ["데이트 첫인상에서 더 중요한 건?", "말투", "옷차림"],
      ["하루를 다시 산다면?", "어제", "10년 전 하루"],
      ["더 참기 힘든 건?", "배고픔", "졸림"],
      ["직장에서 더 싫은 사람은?", "말 많은 사람", "일 안 하는 사람"],
      ["갑자기 100만원이 생기면?", "저축", "소비"],
      ["더 끌리는 여행은?", "바다", "산"],
      ["야식 하나만 고른다면?", "라면", "족발"],
      ["더 어려운 선택은?", "사과하기", "거절하기"]
    ];

    let round = 0;
    let current = null;

    const $ = (id) => document.getElementById(id);

    function formatNumber(n) {
      return n.toLocaleString("ko-KR");
    }

    function randomPlayers() {
      const base = 3800 + Math.floor(Math.random() * 1800);
      $("players").innerText = formatNumber(base);
    }

    function loadQuestion() {
      $("game").classList.remove("hidden");
      $("result").classList.add("hidden");

      current = questions[Math.floor(Math.random() * questions.length)];
      $("question").innerText = current[0];
      $("choiceA").innerText = "A. " + current[1];
      $("choiceB").innerText = "B. " + current[2];

      $("choiceA").onclick = () => choose("A");
      $("choiceB").onclick = () => choose("B");
    }

    function choose(selected) {
      $("game").classList.add("hidden");
      $("result").classList.remove("hidden");

      const aPercent = 35 + Math.floor(Math.random() * 45);
      const bPercent = 100 - aPercent;

      const majority = aPercent > bPercent ? "A" : "B";
      const survived = selected !== majority;

      $("labelA").innerText = "A. " + current[1];
      $("labelB").innerText = "B. " + current[2];
      $("percentA").innerText = aPercent + "%";
      $("percentB").innerText = bPercent + "%";

      setTimeout(() => {
        $("barA").style.width = aPercent + "%";
        $("barB").style.width = bPercent + "%";
      }, 50);

      if (survived) {
        round++;
        $("round").innerText = round;
        $("surviveText").innerText = "YOU SURVIVED";
        $("surviveText").className = "survive win";
        $("desc").innerText = "AI의 다수 예측을 피했습니다.";
      } else {
        $("surviveText").innerText = "ELIMINATED";
        $("surviveText").className = "survive lose";
        $("desc").innerText = "다수 선택에 걸렸습니다.";
      }
    }

    function nextRound() {
      randomPlayers();
      loadQuestion();
    }

    function revive() {
      round = Math.max(0, round);
      $("desc").innerText = "부활 완료. 다음 라운드에 재도전하세요.";
      setTimeout(nextRound, 600);
    }

    randomPlayers();
    loadQuestion();
  </script>
</body>
</html>
